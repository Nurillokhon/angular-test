<div class="p-8 bg-gray-50 min-h-screen" *ngIf="orders && orders.length != 0">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-3xl font-semibold text-gray-800">Orders</h1>

    <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow">
      + Create Order
    </button>
  </div>

  <div class="bg-white p-4 rounded-xl shadow mb-6">
    <input
      type="text"
      placeholder="Search order..."
      class="w-full border p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
    />
  </div>
  <div class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-100 text-gray-600 text-sm">
        <tr>
          <th class="p-4 text-left">ID</th>
          <th class="p-4 text-left">Route</th>
          <th class="p-4 text-left">Weight</th>
          <th class="p-4 text-left">Price</th>
          <th class="p-4 text-left">Status</th>
          <th class="p-4 text-left">Date</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let order of orders" class="border-t hover:bg-gray-50 transition">
          <td class="p-4 font-medium">#{{ order.id }}</td>

          <td class="p-4">{{ order.from }} → {{ order.to }}</td>

          <td class="p-4">{{ order.weight }} kg</td>

          <td class="p-4">{{ order.price | number }} UZS</td>

          <td class="p-4">
            <span
              class="px-3 py-1 text-sm rounded-full text-white"
              [ngClass]="{
                'bg-blue-500': order.status == 'NEW',
                'bg-yellow-500': order.status == 'MODERATION',
                'bg-green-600': order.status == 'ACTIVE',
                'bg-purple-500': order.status == 'IN_TRANSIT',
                'bg-gray-500': order.status == 'DELIVERED',
                'bg-red-500': order.status == 'CANCELLED',
              }"
            >
              {{ order.status }}
            </span>
          </td>

          <td class="p-4 text-gray-500">
            {{ order.createdAt }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div *ngIf="orders.length === 0 && !loading">ma'lumot topilmadi</div>

<div *ngIf="loading">Loading...</div>
